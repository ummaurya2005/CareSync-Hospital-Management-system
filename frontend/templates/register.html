{% extends "base.html" %}
{% block content %}

<section class="register-section">
  <div class="register-card">
    <h2>🧾 Register New Patient</h2>
    <p class="subtitle">Fill out the form below to schedule your appointment and register for face recognition.</p>

    <form method="POST" action="{{ url_for('register.register_page') }}">
      <div class="form-grid">

        <div class="form-group">
          <label for="id">Patient ID</label>
          <input type="number" id="id" name="id" placeholder="Enter unique ID" required>
        </div>

        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
          <label for="age">Age</label>
          <input type="number" id="age" name="age" placeholder="Enter age" required>
        </div>

        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender" name="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group full-width">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>

        <div class="form-group full-width">
          <label for="password">Create Password</label>
          <input type="password" id="password" name="password" placeholder="Create a strong password" required>
        </div>

        <div class="form-group full-width">
          <label for="problem">Health Problem</label>
          <textarea id="problem" name="problem" rows="3" placeholder="Describe your health issue briefly" required></textarea>
        </div>

        <div class="form-group">
          <label for="appointment">Preferred Check-up Date</label>
          <input type="date" id="appointment" name="appointment" required>
        </div>

      </div>

      <button type="submit" class="btn-submit">💾 Register & Capture Face</button>
    </form>

    <div class="note">
      <p>🧠 After registration, your webcam will open to capture your facial data for secure identity verification.</p>
    </div>

    <a href="/" class="back-home">⬅ Back to Home</a>
  </div>
</section>

{% endblock %}
