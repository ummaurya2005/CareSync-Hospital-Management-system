{% extends "base.html" %}
{% block content %}

<section class="camera-section">
  <div class="capture-card">
    <h2>🎥 Face Verification for <span class="highlight">{{ name }}</span></h2>
    <p class="subtitle">Keep your face centered and still for a moment to verify.</p>

    <div class="camera-container">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" style="display:none;"></canvas>
      <div id="loading-spinner" class="spinner" style="display:none;"></div>
    </div>

    <div class="progress"><div id="progress-bar" class="progress-bar"></div></div>

    <p id="status-text">Ready when you are.</p>
    <button id="startBtn" class="btn">▶ Start Verification</button>
  </div>
</section>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const statusText = document.getElementById('status-text');
const startBtn = document.getElementById('startBtn');
const progressBar = document.getElementById('progress-bar');
const spinner = document.getElementById('loading-spinner');
const userId = "{{ user_id }}";

let streamStarted = false;
let verified = false;
let attempts = 0;
let frameSkip = 0; // skip some frames for smoother UI

// === Start Webcam Stream ===
navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
  .then(stream => {
    video.srcObject = stream;
    streamStarted = true;
  })
  .catch(err => {
    alert("⚠️ Please allow camera access.\nError: " + err);
    statusText.textContent = "Camera access required.";
    startBtn.disabled = true;
  });

// === Send Frame to Flask ===
async function sendFrame() {
  if (!streamStarted || verified) return;

  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  const imgData = canvas.toDataURL('image/jpeg', 0.7);

  try {
    const res = await fetch("{{ url_for('patient.verify_frame') }}", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image: imgData, user_id: userId })
    });
    const result = await res.json();

    if (result.status === "verified") {
      verified = true;
      onVerifiedSuccess();
    }
  } catch (e) {
    console.warn("Network delay:", e);
  }

  attempts++;
  progressBar.style.width = `${Math.min((attempts / 20) * 100, 100)}%`;
}

// === Continuous Capture Loop (very fast) ===
function continuousVerify() {
  if (verified) {
    return;   // stop immediately if verified
  }

  if (attempts >= 20) {
    onVerifyEnd();
    return;
  }

  if (frameSkip % 2 === 0) {
    sendFrame();
  }

  frameSkip++;

  // slower loop for cloud deployment
  setTimeout(() => {
    requestAnimationFrame(continuousVerify);
  }, 200);
}
// === Button Action ===
startBtn.onclick = () => {
  startBtn.disabled = true;
  spinner.style.display = "block";
  statusText.textContent = "🔎 Verifying...";
  statusText.style.color = "#007bff";
  verified = false;
  attempts = 0;
  frameSkip = 0;
  progressBar.style.width = "0%";

  continuousVerify();
};

// === Handle Success ===
function onVerifiedSuccess() {
  spinner.style.display = "none";
  statusText.textContent = "✅ Verification Successful!";
  statusText.style.color = "#28a745";
  progressBar.style.width = "100%";
  setTimeout(() => window.location.href = "{{ url_for('patient.details') }}", 1000);
}

// === Handle Fail (timeout) ===
function onVerifyEnd() {
  if (!verified) {
    spinner.style.display = "none";
    statusText.textContent = "❌ Verification Failed. Try again.";
    statusText.style.color = "#dc3545";
    startBtn.disabled = false;
    progressBar.style.width = "0%";
  }
}
</script>

<style>
/* === Layout === */
.camera-section {
  display:flex; justify-content:center; align-items:center;
  padding:60px 20px; background:linear-gradient(135deg,#f0f8ff,#e8f5e9);
  min-height:90vh;
}

/* === Card === */
.capture-card {
  background:#fff; border-radius:20px; padding:40px 50px;
  width:100%; max-width:640px; text-align:center;
  box-shadow:0 8px 25px rgba(0,0,0,0.12);
  transition:transform .3s ease, box-shadow .3s ease;
}
.capture-card:hover {
  transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(0,123,255,0.25);
}
h2 { color:#222; font-size:1.8rem; margin-bottom:10px; }
.highlight { color:#007bff; font-weight:600; }
.subtitle { color:#555; margin-bottom:25px; }

/* === Camera View === */
.camera-container {
  position:relative; width:480px; height:360px;
  border-radius:12px; border:3px solid #007bff;
  margin:20px auto; overflow:hidden;
  background:#000; box-shadow:0 0 15px rgba(0,123,255,0.3);
}
video { width:100%; height:100%; object-fit:cover; }

/* === Spinner === */
.spinner {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:60px; height:60px;
  border:6px solid #ddd; border-top:6px solid #007bff;
  border-radius:50%; animation:spin 1s linear infinite;
  z-index:5;
}
@keyframes spin { to { transform:translate(-50%,-50%) rotate(360deg); } }

/* === Progress === */
.progress { width:100%; height:10px; background:#e0e0e0;
  border-radius:8px; margin:15px 0; overflow:hidden;
}
.progress-bar {
  height:10px; background:linear-gradient(90deg,#007bff,#28a745);
  width:0%; transition:width .25s ease-in-out;
}

/* === Status + Button === */
#status-text { font-size:1.1rem; margin-top:10px; color:#444; font-weight:500; }

.btn {
  background:linear-gradient(90deg,#007bff,#00c6ff);
  color:white; border:none; padding:12px 30px; border-radius:10px;
  margin-top:15px; cursor:pointer; font-size:1rem;
  transition:all .3s ease;
}
.btn:hover { background:linear-gradient(90deg,#0056b3,#0099ff); transform:scale(1.05); }
</style>

{% endblock %}
