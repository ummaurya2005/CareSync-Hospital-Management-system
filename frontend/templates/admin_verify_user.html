{% extends "base.html" %}
{% block content %}

<section class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-blue-50 via-white to-green-50 p-8">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-3xl text-center relative overflow-hidden">

    <h2 class="text-3xl font-bold text-blue-700 mb-3">
      👁️ Face Verification for <span class="text-green-600">{{ name }}</span>
    </h2>
    <p class="text-gray-600 mb-5">
      Please ensure good lighting and align the patient's face within the camera view.
    </p>

    <!-- Camera container -->
    <div class="relative rounded-xl overflow-hidden border-4 border-blue-500 shadow-lg mx-auto w-[480px] h-[360px] bg-black">
      <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
      <canvas id="canvas" style="display:none;"></canvas>
      <div id="overlay" class="absolute inset-0 bg-white opacity-0 transition-opacity duration-200"></div>
    </div>

    <!-- Progress -->
    <div class="mt-6 w-full bg-gray-200 rounded-full h-3 overflow-hidden">
      <div id="progress-bar" class="h-3 w-0 bg-gradient-to-r from-blue-500 to-green-500 transition-all duration-200"></div>
    </div>

    <p id="status" class="mt-4 text-gray-700 font-medium text-lg">Waiting to start verification...</p>

    <button id="startBtn" class="mt-6 px-8 py-3 bg-gradient-to-r from-blue-600 to-green-500 text-white font-semibold rounded-xl shadow hover:shadow-lg hover:from-blue-700 hover:to-green-600 transition">
      ▶ Start Verification
    </button>

    <a href="{{ url_for('admin.dashboard') }}" 
       class="block mt-4 text-gray-600 hover:text-blue-700 text-sm font-medium transition">
      ⬅ Back to Dashboard
    </a>
  </div>
</section>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const startBtn = document.getElementById('startBtn');
const progressBar = document.getElementById('progress-bar');
const overlay = document.getElementById('overlay');
const statusText = document.getElementById('status');
const userId = "{{ user_id }}";

navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => video.srcObject = stream)
  .catch(err => {
    alert("⚠️ Camera access denied or unavailable: " + err);
    statusText.textContent = "Camera access denied.";
  });

async function sendFrame() {
  const ctx = canvas.getContext('2d');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const imgData = canvas.toDataURL('image/jpeg');

  overlay.style.opacity = "0.5";
  setTimeout(() => (overlay.style.opacity = "0"), 120);

  const res = await fetch("{{ url_for('admin.verify_user_frame') }}", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ image: imgData, user_id: userId })
  });

  return await res.json();
}

startBtn.onclick = async () => {
  startBtn.disabled = true;
  statusText.textContent = "🔎 Verifying face...";
  statusText.style.color = "#007bff";

  let attempts = 0;
  const maxAttempts = 40;
  let verified = false;

  while (attempts < maxAttempts) {
    const result = await sendFrame();

    progressBar.style.width = `${(attempts / maxAttempts) * 100}%`;

    
    if (result.status === "approved") {
    alert("✅ Face verified and approved successfully!");
        window.location.href = "{{ url_for('admin.dashboard') }}";
    } 
    else if (result.status === "failed") {
        alert("❌ Verification failed! Wrong person detected.");
        window.location.href = result.redirect || "{{ url_for('admin.dashboard') }}";
    } 
    else if (result.status === "no_face") {
        alert("⚠️ No face detected. Please try again.");
    }


    attempts++;
    await new Promise(r => setTimeout(r, 200)); // ~5 FPS
  }

  progressBar.style.width = "100%";
  if (verified) {
    statusText.textContent = "✅ Verification Successful! Patient Approved.";
    statusText.style.color = "#28a745";
    progressBar.classList.remove("bg-gradient-to-r", "from-blue-500", "to-green-500");
    progressBar.classList.add("bg-green-500");

    setTimeout(() => {
      window.location.href = "{{ url_for('admin.dashboard') }}";
    }, 1500);
  } else {
    statusText.textContent = "❌ Verification Failed. Please retry.";
    statusText.style.color = "#dc3545";
    startBtn.disabled = false;
  }
};
</script>

<style>
#overlay {
  pointer-events: none;
  z-index: 5;
}
</style>

{% endblock %}
